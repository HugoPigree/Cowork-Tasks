# Example reverse proxy in front of Gunicorn (Cowork-Tasks `web` on port 8000).
# Copy/adapt for your domain and TLS certificates (Let's Encrypt, etc.).
#
# If you serve /media/ here, set DJANGO_SERVE_MEDIA=false and point alias to the same
# directory as MEDIA_ROOT (e.g. Docker volume mount path on the host).

upstream cowork_tasks_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    client_max_body_size 8M;

    location /api/ {
        proxy_pass http://cowork_tasks_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://cowork_tasks_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://cowork_tasks_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: serve user uploads from disk (match Docker volume for /app/media)
    # location /media/ {
    #     alias /var/lib/cowork-tasks/media/;
    # }

    location / {
        root /var/www/cowork-tasks-frontend;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.example.com;
    return 301 https://$host$request_uri;
}
