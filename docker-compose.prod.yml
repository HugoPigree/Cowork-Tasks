services:
  cowork_backend:
    networks:
      - web
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cowork-tasks-backend.rule=Host(`${DOMAIN:-localhost}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/media`))"
      - "traefik.http.routers.cowork-tasks-backend.entrypoints=websecure"
      - "traefik.http.routers.cowork-tasks-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cowork-tasks-backend.priority=100"
      - "traefik.http.services.cowork-tasks-backend.loadbalancer.server.port=8000"

  cowork_frontend:
    networks:
      - web
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cowork-tasks-frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.cowork-tasks-frontend.entrypoints=websecure"
      - "traefik.http.routers.cowork-tasks-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cowork-tasks-frontend.priority=10"
      - "traefik.http.services.cowork-tasks-frontend.loadbalancer.server.port=80"

networks:
  web:
    external: true
