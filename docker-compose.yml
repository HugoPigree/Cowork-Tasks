# Cowork-Tasks — une commande suffit en local :
#   docker compose up --build -d
# Puis ouvrir http://localhost:8080 (API : http://localhost:8000)
#
# Aucun fichier .env obligatoire : valeurs par défaut ci‑dessous (démo / dev local).
# Pour la production, créez un .env (voir .env.example) et surtout changez SECRET_KEY / DB_PASSWORD.
#
# Mode Vite HMR (optionnel) :
#   docker compose --profile dev up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-taskmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coworktasks_local}
      POSTGRES_DB: ${DB_NAME:-taskmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      SECRET_KEY: ${SECRET_KEY:-cowork-tasks-local-docker-only-change-me-for-any-real-deploy-9f3a2b1c}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DB_NAME: ${DB_NAME:-taskmanager}
      DB_USER: ${DB_USER:-taskmanager}
      DB_PASSWORD: ${DB_PASSWORD:-coworktasks_local}
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_TRUST_X_FORWARDED_PROTO: ${DJANGO_TRUST_X_FORWARDED_PROTO:-true}
      DJANGO_SERVE_MEDIA: ${DJANGO_SERVE_MEDIA:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080}
      API_PAGE_SIZE: ${API_PAGE_SIZE:-10}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --access-logfile - --error-logfile -"
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  # Build Vite + nginx — démarre toujours avec `docker compose up` (pas de profil requis).
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optionnel : npm run dev + HMR — docker compose --profile dev up --build
  frontend-dev:
    profiles:
      - dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules
    environment:
      VITE_DEV_PROXY_TARGET: http://web:8000
    ports:
      - "${DEV_PORT:-5173}:5173"
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  frontend_dev_node_modules:
